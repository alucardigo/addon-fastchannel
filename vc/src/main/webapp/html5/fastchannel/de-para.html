<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fastchannel Integration - De-Para</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --border: #0f3460;
            --text: #eaeaea;
            --muted: #94a3b8;
            --accent: #00d9ff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1500px; margin: 0 auto; padding: 24px; }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo { width: 48px; height: 48px; border-radius: 8px; }

        .header h1 { font-size: 24px; font-weight: 600; }
        .header h1 span { color: var(--accent); }

        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 10px 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-tab:hover { border-color: var(--accent); color: var(--text); }
        .nav-tab.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title { font-size: 18px; font-weight: 600; }

        .sub-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }

        .sub-tab {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sub-tab:hover { border-color: var(--accent); color: var(--text); }
        .sub-tab.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .form-input {
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            min-width: 150px;
        }

        .form-input:focus { outline: none; border-color: var(--accent); }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:hover { background: #00b8d9; }
        .btn-secondary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .action-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .table-container { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg);
        }

        td { font-size: 14px; }

        tr:hover { background: rgba(0, 217, 255, 0.05); }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }

        .editable-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 14px;
            width: 200px;
        }

        .editable-input:focus { outline: none; border-color: var(--accent); }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: white;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--accent); color: var(--bg); }

        .new-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px dashed var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="../../assets/fastchannel-logo-dark.jpeg" alt="Fastchannel" class="logo">
            <h1>Fast<span>channel</span> - De-Para</h1>
        </header>

        <nav class="nav-tabs">
            <a class="nav-tab" href="dashboard.html">Dashboard</a>
            <a class="nav-tab" href="config.html">Configuracao</a>
            <a class="nav-tab active" href="de-para.html">De-Para</a>
            <a class="nav-tab" href="pedidos.html">Pedidos</a>
            <a class="nav-tab" href="estoque.html">Estoque</a>
            <a class="nav-tab" href="precos.html">Precos</a>
            <a class="nav-tab" href="fila.html">Fila de Sincronizacao</a>
            <a class="nav-tab" href="logs.html">Logs</a>
        </nav>

        <div class="card">
            <div class="sub-tabs">
                <button class="sub-tab active" onclick="switchTab('EMPRESA')">Empresas</button>
                <button class="sub-tab" onclick="switchTab('LOCAL')">Locais</button>
                <button class="sub-tab" onclick="switchTab('TABELA_PRECO')">Tabelas de Preco</button>
                <button class="sub-tab" onclick="switchTab('STOCK_STORAGE')">Storage (Estoque)</button>
                <button class="sub-tab" onclick="switchTab('STOCK_RESELLER')">Reseller (Estoque)</button>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <span class="filter-label">Codigo Sankhya</span>
                    <input type="text" id="filterCodSankhya" class="form-input" placeholder="Ex: 1" oninput="debounceLoad()">
                </div>
                <div class="filter-group">
                    <span class="filter-label">Descricao</span>
                    <input type="text" id="filterDescricao" class="form-input" placeholder="Buscar..." oninput="debounceLoad()">
                </div>
                <div class="filter-group" style="justify-content: flex-end;">
                    <button class="btn btn-secondary" onclick="loadData()">Recarregar</button>
                </div>
                <div class="filter-group" style="justify-content: flex-end;">
                    <button class="btn btn-primary" onclick="saveAll()">Salvar alteracoes</button>
                </div>
            </div>

            <div class="new-row" id="addRow">
                <div class="filter-group">
                    <span class="filter-label">Novo mapeamento - Cod Sankhya</span>
                    <input type="number" id="newCodSankhya" class="form-input" placeholder="Codigo">
                </div>
                <div class="filter-group">
                    <span class="filter-label">Cod Externo (Fastchannel)</span>
                    <input type="text" id="newCodExterno" class="form-input" placeholder="ID Fastchannel">
                </div>
                <button class="btn btn-primary btn-sm" onclick="addMapping()">Adicionar</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Cod Sankhya</th>
                            <th>Descricao</th>
                            <th>Cod Externo (Fastchannel)</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="4" class="empty-state">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function resolveAddonContexts() {
            const origin = window.location.origin || '';
            const path = window.location.pathname || '';
            const search = window.location.search || '';
            const contexts = ['/addon-fastchannel'];

            function add(ctx) {
                if (!ctx) return;
                if (ctx.endsWith('/')) ctx = ctx.substring(0, ctx.length - 1);
                if (contexts.indexOf(ctx) === -1) contexts.push(ctx);
            }

            function addIfAddon(ctx) {
                if (!ctx) return;
                if (ctx.startsWith('/mge/') && ctx.indexOf('/addon-fastchannel') > 0) {
                    ctx = ctx.replace(/^\/mge/, '');
                }
                if (ctx.indexOf('/addon-fastchannel') === -1) return;
                add(ctx);
            }

            try {
                var htmlIdx = path.indexOf('/html5/');
                if (htmlIdx > 0) {
                    add(path.substring(0, htmlIdx));
                }
            } catch (e) {}

            try {
                if (window.top && window.top.location && window.top.location.pathname) {
                    var topPath = window.top.location.pathname;
                    var mgeIdx = topPath.indexOf('/mge');
                    if (mgeIdx >= 0 && topPath.indexOf('addon-fastchannel') > 0) {
                        var ctx = topPath.substring(mgeIdx + 4);
                        var end = ctx.indexOf('/', 1);
                        if (end > 0) ctx = ctx.substring(0, end);
                        addIfAddon(ctx);
                    }
                }
            } catch (e) {}

            try {
                var urlParams = new URLSearchParams(search);
                var ctx = urlParams.get('ctx') || urlParams.get('context');
                if (ctx) addIfAddon(ctx);
            } catch (e) {}

            return contexts;
        }

        function getMgeSession() {
            try {
                if (window.top && window.top.SNKCONTEXT && window.top.SNKCONTEXT.jsessionid) {
                    return window.top.SNKCONTEXT.jsessionid;
                }
            } catch (e) {}
            try {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var c = cookies[i].trim();
                    if (c.startsWith('JSESSIONID=')) return c.substring(11);
                }
            } catch (e) {}
            return null;
        }

        const addonContexts = resolveAddonContexts();
        let currentTab = 'EMPRESA';
        let pendingChanges = {};
        let debounceTimer = null;

        async function callService(serviceName, payload) {
            const payloadStr = JSON.stringify(payload || {});
            const bases = addonContexts.map(b => `${b}/fc-direct`);
            let lastErr = null;
            const session = getMgeSession();
            for (const base of bases) {
                try {
                    const qs = new URLSearchParams({ serviceName, outputType: 'json' });
                    if (session) qs.append('mgeSession', session);
                    const resp = await fetch(`${base}?${qs.toString()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: payloadStr,
                        credentials: 'include'
                    });
                    if (resp.ok) return await resp.json();
                    lastErr = `HTTP ${resp.status}`;
                } catch (e) {
                    lastErr = e.message;
                }
            }
            throw new Error(lastErr || 'Servico indisponivel');
        }

        function switchTab(tipo) {
            currentTab = tipo;
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            pendingChanges = {};
            loadData();
        }

        function debounceLoad() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(loadData, 400);
        }

        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><div class="spinner"></div></td></tr>';

            try {
                const params = { tipo: currentTab };

                const codSankhya = document.getElementById('filterCodSankhya').value.trim();
                if (codSankhya) params.codSankhya = parseInt(codSankhya);

                const descricao = document.getElementById('filterDescricao').value.trim();
                if (descricao) params.descricao = descricao;

                const data = await callService('FCDeParaSP.list', params);

                if (data.error) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Erro: ' + data.error + '</td></tr>';
                    return;
                }

                const items = data.items || [];
                if (items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Nenhum registro encontrado</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(item => `
                    <tr>
                        <td>${item.codSankhya || '--'}</td>
                        <td>${item.descricao || '--'}</td>
                        <td>
                            <input type="text" class="editable-input"
                                value="${item.codExterno || ''}"
                                data-id="${item.id}"
                                data-cod="${item.codSankhya}"
                                data-original="${item.codExterno || ''}"
                                onchange="markChanged(this)">
                        </td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="removeMapping(${item.codSankhya})">Remover</button>
                        </td>
                    </tr>
                `).join('');

            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Erro: ' + e.message + '</td></tr>';
            }
        }

        function markChanged(input) {
            const cod = input.dataset.cod;
            const newVal = input.value.trim();
            const original = input.dataset.original;

            if (newVal !== original) {
                pendingChanges[cod] = newVal;
                input.style.borderColor = 'var(--warning)';
            } else {
                delete pendingChanges[cod];
                input.style.borderColor = 'var(--border)';
            }
        }

        async function saveAll() {
            const keys = Object.keys(pendingChanges);
            if (keys.length === 0) {
                showToast('Nenhuma alteracao pendente', 'info');
                return;
            }

            try {
                const items = keys.map(cod => ({
                    tipo: currentTab,
                    codSankhya: parseInt(cod),
                    codExterno: pendingChanges[cod]
                }));

                const result = await callService('FCDeParaSP.save', { items });

                if (result.success !== false) {
                    showToast('Salvo: ' + (result.saved || keys.length) + ' registro(s)', 'success');
                    pendingChanges = {};
                    loadData();
                } else {
                    showToast('Erro: ' + (result.message || 'falha ao salvar'), 'error');
                }
            } catch (e) {
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function addMapping() {
            const codSankhya = document.getElementById('newCodSankhya').value.trim();
            const codExterno = document.getElementById('newCodExterno').value.trim();

            if (!codSankhya || !codExterno) {
                showToast('Preencha Cod Sankhya e Cod Externo', 'error');
                return;
            }

            try {
                const result = await callService('FCDeParaSP.save', {
                    tipo: currentTab,
                    codSankhya: parseInt(codSankhya),
                    codExterno: codExterno
                });

                if (result.success !== false) {
                    showToast('Mapeamento adicionado', 'success');
                    document.getElementById('newCodSankhya').value = '';
                    document.getElementById('newCodExterno').value = '';
                    loadData();
                } else {
                    showToast('Erro: ' + (result.message || 'falha'), 'error');
                }
            } catch (e) {
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function removeMapping(codSankhya) {
            if (!confirm('Remover mapeamento para cod ' + codSankhya + '?')) return;

            try {
                const result = await callService('FCDeParaSP.remove', {
                    tipo: currentTab,
                    codSankhya: codSankhya
                });

                if (result.success) {
                    showToast('Mapeamento removido', 'success');
                    loadData();
                } else {
                    showToast('Erro: ' + (result.message || 'falha'), 'error');
                }
            } catch (e) {
                showToast('Erro: ' + e.message, 'error');
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // Init
        loadData();
    </script>
</body>
</html>
